  pari: <img src = "https://pari.math.u-bordeaux.fr/logo/Logo%20Couleurs/Logo_PARI-GP_Couleurs_L150px.png" width="50px">
  magma: <img src = "https://i.stack.imgur.com/0468s.png" width="50px">
  oscar: <img src = "https://oscar-system.github.io/Oscar.jl/stable/assets/logo.png" width="50px">

not-implemented:
  sage: |
    # (not yet implemented)
  pari: |
    \\ (not yet implemented)
  magma: |
    // (not yet implemented)
  oscar: |
    # (not yet implemented)

# Valid keys are: 'all' any key appearing in prompt, and 'rest'
frontmatter:
  all: |
    {lang} code for working with lattice {label}.
  oscar: |
    If you have not already loaded the Oscar package, you should type "using Oscar;" before running the code below.
  rest: |
    Some of these functions may take a long time to execute (this depends on the lattice).

lattice_definition:
  comment: Define the lattice
  sage: L = IntegralLattice(Matrix(ZZ, {n}, {n}, {gram}))
  pari: L = {gram}
  magma: L := LatticeWithGram({n}, {gram});
  oscar: L = integer_lattice(gram = matrix(QQ, {n}, {n}, {gram}))


rank:
  comment: Rank
  sage: L.rank()
  magma:  Rank(L);
  oscar: rank(L)

signature:
  comment: Signature
  sage: L.signature_pair()
  magma: Signature(L);
  oscar: signature_tuple(L)

determinant:
  comment: Determinant
  sage: L.determinant()
  magma: Determinant(L);
  oscar: det(L)

discriminant:
  comment: Discrimnant
  sage: L.discriminant()
  magma: Discriminant(L);
  oscar: discriminant(L)

level:
  comment: Level
  magma: Level(L);
  sage: L.genus().level()

class_number:
  comment: Class number
  magma: |
    #Genus(L);

conway_symbol:
  comment: Conway symbol
  magma: ConwaySymbol(Genus(L));

parity:
  comment: Parity
  sage: L.is_even()
  magma: IsEven(L);
  oscar: iseven(L)

automorphism_group:
  comment: Automorphism group
  magma: AutomorphismGroup(L);
  sage: L.automorphisms()

automorphism_group_order:
  comment: Order of the automorphism group
  magma: Order(AutomorphismGroup(L));
  sage: L.automorphisms().order()
  oscar: automorphism_group_order(L)

density:
  comment: Density
  magma: Density(L);

hermite:
  comment: Hermite number
  magma: HermiteNumber(L);

kissing:
  comment: Kissing number
  magma: KissingNumber(L);
  oscar: kissing_number(L)

festi_veniani:
  comment: Festi-Veniani index
  magma: |
    // (not yet implemented)

minimum:
  comment: Minimum
  magma: Minimum(L);
  oscar: minimum(L)

discriminant_group:
  comment: Discriminant group
  sage: L.discriminant_group()
  oscar: discriminant_group(L)

minimal_vectors:
  comment: Minimal vectors
  magma: ShortestVectors(L);

mass:
  comment: Mass
  magma: Mass(L);

theta_series:
  comment: Theta series
  magma: ThetaSeries(L, 100);

gram:
  comment: Gram matrix
  sage: L.gram_matrix()
  magma: GramMatrix(L);
  oscar: gram_matrix(L)

dual:
  comment: Dual lattice
  sage: L.dual_lattice()
  magma: Dual(L);
  oscar: dual(L)

dual_det:
  comment: Determinant of the dual lattice
  magma: Determinant(Dual(L));
  sage: L.dual_lattice().determinant()
  oscar: det(dual(L))

dual_conway:
  comment: Conway symbol of the dual lattice
  magma: ConwaySymbol(Genus(Dual(L)));

dual_density:
  comment: Density of the dual lattice
  magma: Density(Dual(L));

dual_kissing:
  comment: Kissing number of the dual lattice
  magma: Kissing(Dual(L));
  oscar: kissing_number(dual(L))

dual_hermite:
  comment: Hermite number of the dual lattice
  magma: Hermite(Dual(L));

dual_theta:
  comment: Theta series of the dual lattice
  magma: ThetaSeries(Dual(L));
  
quadratic_form:
  comment: Quadratic form associated to the lattice
  magma: QuadraticForm(L);

genus:
  comment: Genus
  sage: L.genus()
  magma: Genus(L);
  oscar: genus(L)

pneighbors:
  comment: p-Neighbors of the lattice
  magma: Neighbors(p, L);

orthogonal_decomposition:
  comment: Orthogonal decomposition
  magma: OrthogonalDecomposition(L);

even_sublattice:
  comment: Even sublattice
  magma: EvenSublattice(L);

successive_minima:
  comment: Successive minima
  magma: SuccessiveMinima(L);


